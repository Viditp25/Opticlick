name: CI - Lint, Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint → Build → Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for davelosert/vitest-coverage-report-action to annotate
      # changed files on non-fork PRs. On fork PRs this is still read-only
      # (GitHub caps it) so the annotation step is a no-op — that's fine.
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy icons
        run: npm run copy-icons

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Auto-increment version (main pushes only) ─────────────────────────────
      - name: Bump version to 1.0.<commit_count>
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          NEW_VERSION="1.0.${COMMIT_COUNT}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "📦 Extension version set to $NEW_VERSION"

      # ── Build (required before any tests) ────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Install Playwright browser (needed before any tests run) ─────────────
      # --with-deps installs the OS libraries (libnss3, libglib2.0-0, etc.)
      # that Playwright's Chromium needs on Ubuntu.
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── All tests with coverage (unit + integration + dom + e2e) ─────────────
      # Chrome extensions cannot run in --headless mode — Xvfb provides a
      # virtual display for the E2E tests. xvfb-run --auto-servernum picks a
      # free display number so parallel runners never collide.
      - name: Test all projects with coverage
        run: xvfb-run --auto-servernum -- npm run test:coverage

      # Post inline annotations on non-fork PRs (read-write token).
      # Fork PRs: action gracefully skips the comment — coverage is still
      # uploaded as an artifact and deployed by ci-report.yml.
      - name: Report coverage (inline annotations)
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          file-coverage-mode: changes

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # ── Upload coverage + metadata so ci-report.yml can deploy them ──────────
      - name: Prepare coverage artifact
        id: prep-coverage
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -d "coverage" ]; then
            mkdir -p deploy-coverage/previews/pr-${{ github.event.number }}/coverage-report
            cp -r coverage/. deploy-coverage/previews/pr-${{ github.event.number }}/coverage-report/
            pct=$(node -e "try { console.log(require('./coverage/coverage-summary.json').total.lines.pct + '%'); } catch { console.log('N/A'); }")
            echo "coverage_pct=$pct" >> $GITHUB_OUTPUT
            echo "coverage_exists=true" >> $GITHUB_OUTPUT
          else
            pct="N/A"
            echo "coverage_exists=false" >> $GITHUB_OUTPUT
            echo "coverage_pct=N/A" >> $GITHUB_OUTPUT
          fi
          # Save metadata for the deploy job
          echo "${{ github.event.number }}" > deploy-coverage/PR_NUMBER
          echo "${{ github.head_ref }}" > deploy-coverage/HEAD_REF
          echo "${{ github.sha }}" > deploy-coverage/SHA
          echo "$pct" > deploy-coverage/COVERAGE_PCT

      - name: Upload coverage artifact
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pr-${{ github.event.number }}
          path: deploy-coverage/
          retention-days: 1

      # ── Main-branch only: package & save extension zip ────────────────────────
      - name: Package extension
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm run zip
          mv .output/*.zip release.zip || true

      - name: Save release artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: release.zip
          retention-days: 1

  release:
    name: Release to Chrome Web Store
    runs-on: ubuntu-latest
    needs: ci
    if: github.repository == 'sudip-mondal-2002/Opticlick' && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: release-zip

      - name: Upload to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'upload'
          client_id: ${{ secrets.CLIENT_ID }}
          client_secret: ${{ secrets.CLIENT_SECRET }}
          refresh_token: ${{ secrets.REFRESH_TOKEN }}
          extension_id: plcgabnobclbdbiemnmkkjcgbfefepkc
          zip_file: 'release.zip'